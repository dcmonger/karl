[railway]
  (empty — no default service, two services defined below)

[[railway.service]]
  name = "kitchen-agent"
  builder = "python"
  pythonVersion = "3.11"
  startCommand = "cd kitchen_agent && uvicorn bot:app --host 0.0.0.0 --port $PORT"
  envVars.PORT = "8000"
  envVars.USE_WEBHOOK = "true"
  envVars.AGENT_BASE_URL = "https://kitchen-agent.up.railway.app"
  envVars.GEMINI_KEY.ref = "GEMINI_KEY"
  envVars.TELEGRAM_TOKEN.ref = "TELEGRAM_TOKEN"
  envVars.DEFAULT_CHAT_ID = "default"

[[railway.service]]
  name = "reminder-daemon"
  builder = "python"
  pythonVersion = "3.11"
  startCommand = "cd kitchen_agent && uvicorn scheduler.reminder_daemon:app --host 0.0.0.0 --port $PORT"
  envVars.PORT = "8001"
  envVars.REMINDER_PORT = "8001"
  envVars.TELEGRAM_TOKEN.ref = "TELEGRAM_TOKEN"

[railway.variable]
  name = "GEMINI_KEY"
  value = ""

[railway.variable]
  name = "TELEGRAM_TOKEN"
  value = ""
