version: "3.8"

services:
  kitchen-agent:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - USE_WEBHOOK=false
      - GEMINI_KEY=${GEMINI_KEY}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - DB_PATH=kitchen_agent/storage/kitchen.db
      - CHROMA_PATH=kitchen_agent/storage/chroma
      - REMINDER_DAEMON_URL=http://reminder-daemon:8001
      - AGENT_BASE_URL=http://localhost:8000
    volumes:
      - ./kitchen_agent/storage:/app/kitchen_agent/storage
    depends_on:
      - reminder-daemon

  reminder-daemon:
    build: .
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - REMINDER_PORT=8001
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
    volumes:
      - ./kitchen_agent/storage:/app/kitchen_agent/storage

  # Local ChromaDB (optional — for production use persistent container)
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8002:8000"
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  chroma_data:
